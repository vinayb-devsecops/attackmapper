<!DOCTYPE html>
<html>
<head>
<title>AttackMapper</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

<h1>AttackMapper</h1>

<p>MITRE ATT&CK Detection Mapping Platform</p>

<table class="table table-striped">

<tr>
<th>Technique</th>
<th>Name</th>
<th>Detection</th>
</tr>

{% for t in techniques %}
<tr>
<td>{{ t.technique }}</td>
<td>{{ t.name }}</td>
<td>{{ t.detection }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
